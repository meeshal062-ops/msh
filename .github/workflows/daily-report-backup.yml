name: Syrve Sales Report Backup Schedule

on:
  # Backup high-frequency gated schedule. Same time gate and same dedupe marker as the main workflow.
  schedule:
    # Every 5 minutes from 09:00 to 10:55 Riyadh = 06:00 to 07:55 UTC.
    - cron: "*/5 6,7 * * *"
  workflow_dispatch:

concurrency:
  group: syrve-daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight time window and report key
        id: preflight
        run: |
          RIYADH_TIME=$(TZ=Asia/Riyadh date '+%Y-%m-%d %H:%M:%S')
          RIYADH_HOUR=$(TZ=Asia/Riyadh date '+%H')
          RIYADH_EPOCH=$(TZ=Asia/Riyadh date '+%s')
          TARGET_EPOCH=$(TZ=Asia/Riyadh date -d 'today 10:00' '+%s')
          END_EPOCH=$(TZ=Asia/Riyadh date -d 'today 11:00' '+%s')
          REPORT_DATE=$(TZ=Asia/Riyadh date -d 'yesterday' '+%Y-%m-%d')
          echo "Riyadh time: $RIYADH_TIME"
          echo "Previous business date: $REPORT_DATE"
          echo "cache_key=syrve-report-sent-$REPORT_DATE" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run: running immediately."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "sleep_seconds=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$RIYADH_EPOCH" -lt "$TARGET_EPOCH" ]; then
            SLEEP_SECONDS=$((TARGET_EPOCH - RIYADH_EPOCH))
            echo "Scheduled run started before 10 AM Riyadh. It will wait $SLEEP_SECONDS seconds until 10:00."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "sleep_seconds=$SLEEP_SECONDS" >> "$GITHUB_OUTPUT"
          elif [ "$RIYADH_EPOCH" -lt "$END_EPOCH" ]; then
            echo "Scheduled run started inside 10:00-10:59 Riyadh. Running now."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "sleep_seconds=0" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled run started after 10:59 Riyadh. Skipping to avoid late delivery."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "sleep_seconds=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait until 10 AM Riyadh if started early
        if: github.event_name == 'schedule' && steps.preflight.outputs.should_run == 'true' && steps.preflight.outputs.sleep_seconds != '0'
        run: |
          remaining=${{ steps.preflight.outputs.sleep_seconds }}
          echo "Waiting until 10:00 AM Asia/Riyadh. Initial remaining seconds: $remaining"
          while [ "$remaining" -gt 0 ]; do
            now=$(TZ=Asia/Riyadh date '+%Y-%m-%d %H:%M:%S')
            echo "Still waiting... Riyadh time: $now, remaining: $remaining seconds"
            if [ "$remaining" -gt 300 ]; then
              sleep 300
              remaining=$((remaining - 300))
            else
              sleep "$remaining"
              remaining=0
            fi
          done
          echo "Reached 10 AM Riyadh window. Continuing."

      - name: Restore daily sent marker
        id: sent-cache
        if: github.event_name == 'schedule' && steps.preflight.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .report-sent
          key: ${{ steps.preflight.outputs.cache_key }}

      - name: Stop if today's scheduled report was already sent
        if: github.event_name == 'schedule' && steps.sent-cache.outputs.cache-hit == 'true'
        run: |
          echo "Report for this business date was already sent. Skipping duplicate scheduled run."

      - name: Set up Python
        if: steps.preflight.outputs.should_run == 'true' && steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.preflight.outputs.should_run == 'true' && steps.sent-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run report automation
        if: steps.preflight.outputs.should_run == 'true' && steps.sent-cache.outputs.cache-hit != 'true'
        env:
          SYRVE_URL: ${{ secrets.SYRVE_URL }}
          SYRVE_USERNAME: ${{ secrets.SYRVE_USERNAME }}
          SYRVE_PASSWORD: ${{ secrets.SYRVE_PASSWORD }}
          SYRVE_MAIN_MENU_TEXT: ${{ secrets.SYRVE_MAIN_MENU_TEXT }}
          SYRVE_REPORTS_SECTION_TEXT: ${{ secrets.SYRVE_REPORTS_SECTION_TEXT }}
          SYRVE_REPORT_NAME: ${{ secrets.SYRVE_REPORT_NAME }}
          BRANCH_CODES: ${{ secrets.BRANCH_CODES }}
          REPORT_DATE_MODE: ${{ secrets.REPORT_DATE_MODE }}

          WHATSAPP_ENABLED: ${{ secrets.WHATSAPP_ENABLED }}
          WATS_API_URL: ${{ secrets.WATS_API_URL }}
          WATS_API_TOKEN: ${{ secrets.WATS_API_TOKEN }}
          WATS_TO: ${{ secrets.WATS_TO }}

          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          EMAIL_FALLBACK_ENABLED: ${{ secrets.EMAIL_FALLBACK_ENABLED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PYTHONUNBUFFERED: "1"
        run: python -u src/main.py

      - name: Mark scheduled report as sent
        if: success() && github.event_name == 'schedule' && steps.preflight.outputs.should_run == 'true' && steps.sent-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .report-sent
          date -u > .report-sent/sent-at.txt

      - name: Save daily sent marker
        if: success() && github.event_name == 'schedule' && steps.preflight.outputs.should_run == 'true' && steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .report-sent
          key: ${{ steps.preflight.outputs.cache_key }}

      - name: Upload report artifact
        if: always() && steps.preflight.outputs.should_run == 'true' && steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: syrve-report-output
          path: output/
          if-no-files-found: ignore
