name: Diagnose RGM Dashboard Direct URL

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Diagnose RGM dashboard
        env:
          SYRVE_USERNAME: ${{ secrets.SYRVE_USERNAME }}
          SYRVE_PASSWORD: ${{ secrets.SYRVE_PASSWORD }}
          WHATSAPP_ENABLED: 'false'
          EMAIL_ENABLED: 'false'
        run: python -u src/diagnose_rgm_dashboard.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose-rgm-dashboard-output
          path: output/
          if-no-files-found: ignore
